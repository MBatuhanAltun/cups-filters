name: Build and Test

on:
  push:
    branches:
      - master
      - 2.0.x
  pull_request:
    branches:
      - master
      - 2.0.x
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cups-filters sources
        uses: actions/checkout@v6

      - name: Show Ubuntu version
        run: cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'

      - name: Update build environment
        run: sudo apt-get update --fix-missing -y

      - name: Install prerequisites
        run: |
          sudo apt-get install -y \
            libcups2-dev \
            libcupsfilters-dev \
            libppd-dev \
            ghostscript \
            liblcms2-dev \
            libpoppler-cpp-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            zlib1g-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libexif-dev \
            libavahi-common-dev \
            libavahi-client-dev \
            poppler-utils \
            sharutils \
            pkg-config \
            autoconf \
            automake \
            libtool \
            gettext \
            autopoint \
            mupdf-tools

      - name: Generate configure script
        run: ./autogen.sh

      - name: Configure cups-filters
        env:
          CC: /usr/bin/gcc
        run: ./configure

      - name: Build cups-filters
        run: make

      - name: Run tests
        run: make check

      - name: Upload test artifacts
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: cups-filters-test-artifacts
          path: |
            test
            **/test-*.log
            **/*.trs

  build-linux-sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cups-filters sources
        uses: actions/checkout@v6

      - name: Show Ubuntu version
        run: cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'

      - name: Update build environment
        run: sudo apt-get update --fix-missing -y

      - name: Install prerequisites
        run: |
          sudo apt-get install -y \
            libcups2-dev \
            libcupsfilters-dev \
            libppd-dev \
            ghostscript \
            liblcms2-dev \
            libpoppler-cpp-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            zlib1g-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libexif-dev \
            libavahi-common-dev \
            libavahi-client-dev \
            poppler-utils \
            sharutils \
            pkg-config \
            autoconf \
            automake \
            libtool \
            gettext \
            autopoint \
            mupdf-tools \
            clang

      - name: Generate configure script
        run: ./autogen.sh

      - name: Configure cups-filters with sanitizers
        env:
          CC: /usr/bin/clang
          CFLAGS: -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer
          CXXFLAGS: -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: ./configure

      - name: Build cups-filters
        run: make

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: make check

      - name: Upload sanitizer artifacts
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: cups-filters-sanitizer-artifacts
          path: |
            test
            **/test-*.log
            **/*.trs
